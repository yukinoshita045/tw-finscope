# render.yaml — Render 平台部署設定(infra as code)
# 在 Render 控制台選 "Blueprint" 並指向這個檔案即可一鍵建立 web service + Postgres
services:
  - type: web
    name: tw-finscope-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tw-finscope-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false   # 部署後在 Render 介面手動填:你的 Vercel 網址
      - key: PYTHON_VERSION
        value: "3.12.4"

databases:
  - name: tw-finscope-db
    plan: free
    databaseName: twfinscope
    user: twfinscope
